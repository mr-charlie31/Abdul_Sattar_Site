// ===== CART SYSTEM =====
let cartItems = JSON.parse(localStorage.getItem('dubaiweeedhub_cart')||'[]');

function saveCart(){localStorage.setItem('dubaiweeedhub_cart',JSON.stringify(cartItems));updateCartUI();}
function addToCart(product){
  const existing = cartItems.find(i=>i.productId===product.id);
  if(existing){existing.quantity++}else{
    cartItems.push({productId:product.id,name:product.name,displayName:product.displayName,price:product.price,image:product.image,quantity:1});
  }
  saveCart();showToast(product.displayName+' added to cart!');
}
function removeFromCart(productId){cartItems=cartItems.filter(i=>i.productId!==productId);saveCart();}
function updateQuantity(productId,qty){
  if(qty<1){removeFromCart(productId);return}
  const item=cartItems.find(i=>i.productId===productId);if(item){item.quantity=qty;saveCart();}
}
function clearCart(){cartItems=[];saveCart();}
function getTotalItems(){return cartItems.reduce((s,i)=>s+i.quantity,0);}
function updateCartUI(){
  const total=getTotalItems();
  const cartBtn=document.getElementById('cart-btn-count');
  if(cartBtn){cartBtn.textContent=total;cartBtn.style.display=total>0?'flex':'none';}
  const topCart=document.getElementById('top-cart-count');
  if(topCart){topCart.textContent=total+' Item'+(total!==1?'s':'');}
}

function showToast(msg){
  const t=document.createElement('div');
  t.className='toast bg-[#1a472a] text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium';
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},2000);
}

function filterShop(cat){
  const grid=document.getElementById('shop-grid');
  const filtered=cat==='all'?products:products.filter(p=>p.category===cat);
  grid.innerHTML=filtered.map(p=>productCard(p)).join('');
  highlightActiveFilter(cat);
}

function highlightActiveFilter(cat){
  document.querySelectorAll('.shop-filter-btn').forEach(b=>{
    if(b.dataset.cat===cat){b.style.background='#1a472a';b.style.color='#fff';b.style.borderColor='#1a472a'}
    else{b.style.background='#fff';b.style.color='#555';b.style.borderColor='#e5e7eb'}
  });
}
